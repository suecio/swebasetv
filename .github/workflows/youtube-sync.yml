name: Sync YouTube Streams

on:
  schedule:
    # Vardagar (Mån-Fre): Kör varje timme mellan 17:00 - 23:00 Svensk sommartid (15:00 - 21:00 UTC)
    - cron: '0 15-21 * * 1-5'
    
    # Helger (Lör-Sön): Kör varje timme mellan 11:00 - 20:00 Svensk sommartid (09:00 - 18:00 UTC)
    - cron: '0 9-18 * * 0,6'
    
  workflow_dispatch: # Denna knapp låter dig fortfarande köra skriptet manuellt när som helst!

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase
        run: npm install firebase

      - name: Run Sync Script
        env:
          # This pulls your API key securely from GitHub Secrets
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node updateYoutube.js
